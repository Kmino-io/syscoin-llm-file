  - label: "Syscoin NEVM / EVM Quick Reference"
    section: "Reference – NEVM Quick Reference"
    time_sensitive: true
    content: |
      ## NEVM (Native EVM) Quick Reference

      Syscoin's NEVM is an EVM-compatible execution layer secured by Syscoin's
      UTXO base chain (merge-mined with Bitcoin). It supports standard
      EVM tooling: Hardhat, Foundry, ethers.js, Metamask, etc.

      ### Connecting MetaMask / Wallets

      **Mainnet**
      - Network Name: Syscoin Mainnet
      - RPC URL: https://rpc.syscoin.org
      - Chain ID: 57
      - Symbol: SYS
      - Block Explorer: https://explorer.syscoin.org

      **Testnet (Tanenbaum)**
      - Network Name: Syscoin Tanenbaum Testnet
      - RPC URL: https://rpc.tanenbaum.io
      - Chain ID: 5700
      - Symbol: tSYS
      - Block Explorer: https://tanenbaum.io

      ### Faucet (testnet SYS)
      https://faucet.tanenbaum.io

  - label: "zkSYS Stack / zk-hardhat Quick Reference"
    section: "Reference – zkSYS Stack / zk-hardhat"
    time_sensitive: true
    content: |
      ## zkSYS Stack / zk-hardhat Quick Reference

      > **Note:** This section includes curated operational values that may change.
      > Always verify chain IDs, RPC URLs, and explorer endpoints with official
      > zkSYS / Syscoin sources before production use.

      ### Tooling requirement: use zk-hardhat

      Standard Hardhat-only deploy flows are not sufficient for zkSYS contracts.
      Use the zkSync-compatible Hardhat toolchain (commonly called "zk-hardhat")
      with zkSync plugins + `zksolc`.

      Common plugins in the zk-hardhat toolchain include:
      - `@matterlabs/hardhat-zksync-solc`
      - `@matterlabs/hardhat-zksync-deploy`
      - `@matterlabs/hardhat-zksync-verify`

      ### Deployment differences vs standard EVM flow

      1. Compiler/toolchain differs
         - Standard EVM flow typically uses `solc` directly via Hardhat.
         - zkSYS flow uses `zksolc` through zk-hardhat plugins.
      2. Artifact/deployment model differs
         - zkSYS deployment may involve additional compiler metadata and
           contract dependency handling compared to a vanilla EVM deploy.
      3. Gas + fee model differs in practice
         - Execution and data publication costs can differ from L1/L2 EVM norms,
           so always estimate fees on target network before deployment.
      4. Verification workflow differs
         - Verification generally requires zkSync-compatible tooling/endpoints rather
           than only standard Etherscan-like settings.

      ### Minimal zk-hardhat workflow

      ```bash
      # install
      npm i -D hardhat @matterlabs/hardhat-zksync-solc @matterlabs/hardhat-zksync-deploy @matterlabs/hardhat-zksync-verify

      # compile (with zksolc configured in hardhat.config)
      npx hardhat compile

      # deploy (network from hardhat config)
      npx hardhat deploy-zksync --script deploy.ts --network zksysTanenbaum
      ```

      ### Chain & endpoint reference (Gateway + zkSYS)

      | Network | Chain ID | RPC | Explorer |
      |---|---:|---|---|
      | Gateway Chain (Tanenbaum) | 57001 | https://rpc-gw.tanenbaum.io | https://explorer-gw.tanenbaum.io |
      | zkSYS Chain (Tanenbaum) | 57057 | https://rpc-zk.tanenbaum.io | https://explorer-zk.tanenbaum.io |

      ### Ecosystem endpoints (Tanenbaum)

      - Bridge: https://bridge-zk.tanenbaum.io
      - Faucet: https://faucet-zk.tanenbaum.io

      Last curated update: 2026-03-20 (manual curation).
      Re-validate before production use.

  - label: "Z-DAG Overview"
    section: "Protocol – Z-DAG"
    time_sensitive: false
    content: |
      ## Z-DAG (Zero-Confirmation Directed Acyclic Graph)

      Z-DAG is Syscoin's probabilistic instant settlement mechanism for
      SYS and Syscoin Platform Token (SPT) transfers on the UTXO layer.
      It provides strong double-spend detection in seconds without waiting
      for block confirmation.

      ### How it works
      1. A transaction is broadcast to the mempool as normal.
      2. Nodes propagate the transaction while continuously checking for
         conflicting inputs across the DAG of in-flight transactions.
      3. If no conflict is detected after the configured propagation window,
         merchants/apps can treat the payment as "Z-DAG safe".
      4. Final on-chain confirmation still occurs at the next block.

      ### Key properties
      - Sub-second conflict detection in well-connected network conditions.
      - Compatible with standard Bitcoin-style UTXO transactions.
      - Does NOT change the UTXO base-chain consensus rules.
      - Risk model: probabilistic, not absolute — use block confirmation for
        high-value irreversible actions.

      ### RPC calls related to Z-DAG
      - `syscoingetspvproof` — returns SPV proof for a transaction.
      - `getzdagstatus` — returns Z-DAG status for a TXID.

