# sources.yaml — Syscoin LLM context bundle manifest
# Defines what to pull, in what order, and how to label each section.
# The generator script reads this file to reproduce a deterministic llms-full.txt.
#
# Last reviewed: 2026-03-12

metadata:
  title: "Syscoin LLM Context Bundle"
  description: >
    A curated, LLM-friendly plaintext bundle of Syscoin's canonical documentation,
    protocol specifications, developer references, and operational guides.
  version: "1.0.0"
  # Bump this when the source list changes meaningfully.
  output_file: "llms-full.txt"
  # Warn readers that time-sensitive data may be stale.
  staleness_notice: >
    WARNING: Network parameters, release versions, chain IDs, and RPC endpoints
    are time-sensitive. Always verify against the official Syscoin documentation
    or repository before using in production.

# ---------------------------------------------------------------------------
# GitHub sources
# Each entry pulls one or more paths from a GitHub repo at a specific ref.
# Supported file types: .md, .txt, .rst  (others are skipped by default).
# ---------------------------------------------------------------------------
github:

  # -- Core protocol / node ------------------------------------------------
  - repo: syscoin/syscoin
    ref: master          # branch, tag, or full commit SHA
    label: "Syscoin Core – Overview"
    paths:
      - doc/README.md
      - doc/release-notes.md
      - doc/release-process.md
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
    section: "Node / Core"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – Node setup & configuration"
    paths:
      - doc/init.md
      - doc/syscoin-conf.md
      - doc/files.md
      - doc/managing-wallets.md
      - doc/reduce-memory.md
      - doc/reduce-traffic.md
    section: "Node – Setup & Configuration"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – Networking & privacy"
    paths:
      - doc/tor.md
      - doc/i2p.md
      - doc/cjdns.md
      - doc/dnsseed-policy.md
      - doc/p2p-bad-ports.md
    section: "Node – Networking & Privacy"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – Build & developer tooling"
    paths:
      - doc/build-unix.md
      - doc/build-osx.md
      - doc/build-windows.md
      - doc/build-freebsd.md
      - doc/build-netbsd.md
      - doc/build-openbsd.md
      - doc/build-android.md
      - doc/dependencies.md
      - doc/developer-notes.md
      - doc/productivity.md
      - doc/benchmarking.md
      - doc/shared-libraries.md
      - doc/guix.md
      - doc/fuzzing.md
      - doc/tracing.md
    section: "Developer – Build & Tooling"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – RPC & API reference"
    paths:
      - doc/JSON-RPC-interface.md
      - doc/REST-interface.md
      - doc/zmq.md
    section: "Developer – RPC & APIs"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – Wallet & transaction workflows"
    paths:
      - doc/psbt.md
      - doc/descriptors.md
      - doc/multisig-tutorial.md
      - doc/external-signer.md
    section: "Developer – Wallet & Transactions"

  - repo: syscoin/syscoin
    ref: master
    label: "Syscoin Core – Standards & process"
    paths:
      - doc/bips.md
      - doc/translation_process.md
      - doc/translation_strings_policy.md
    section: "Research – Standards & Process"

  # -- Rollux (L2 on Syscoin) ----------------------------------------------
  - repo: sys-labs/rollux
    ref: develop
    label: "Rollux – L2 documentation"
    paths:
      - README.md
      - docs/
    section: "Protocol – Rollux (L2)"
    # Recursively include all .md files under docs/
    recursive: true

  # -- SRC-20 / token standard ---------------------------------------------
  - repo: syscoin/sips
    ref: master
    label: "Syscoin Improvement Proposals (SyIPs)"
    paths: []          # empty = include all .md files at repo root
    recursive: false
    section: "Specs – SyIPs"

  # -- Sentinel / Masternode -----------------------------------------------
  - repo: syscoin/sentinel
    ref: master
    label: "Syscoin Sentinel"
    paths:
      - README.md
    section: "Node – Sentinel / Masternodes"

  # -- SDK / libraries ------------------------------------------------------
  - repo: syscoin/syscoinjs-lib
    ref: master
    label: "syscoinjs-lib – JavaScript SDK"
    paths:
      - README.md
      - docs/
    recursive: true
    section: "Developer – JS SDK"

  # -- Pali Wallet ---------------------------------------------------------
  - repo: syscoin/pali-wallet
    ref: master
    label: "Pali Wallet"
    paths:
      - README.md
      - docs/
      - source/scripts/Background/controllers/message-handler/README.md
    recursive: true
    section: "Developer – Pali Wallet"

  # -- Syscoin Bridge -------------------------------------------------------
  - repo: syscoin/syscoin-bridge
    ref: main
    label: "Syscoin Bridge"
    paths:
      - README.md
      - docs/
    recursive: true
    section: "Developer – Syscoin Bridge"

  # -- ZK Network (zksync-era fork) ----------------------------------------
  - repo: sidhujag/zksync-era
    ref: main
    label: "Syscoin ZK Network – zksync-era"
    paths:
      - README.md
      - docs/
      - CHANGELOG.md
      - CONTRIBUTING.md
      - core/bin/external_node/README.md
      - core/lib/config/README.md
      - core/lib/da_client/README.md
      - core/lib/dal/README.md
      - core/lib/multivm/README.md
      - core/lib/vm_interface/README.md
      - core/node/api_server/README.md
      - core/node/consensus/README.md
      - core/node/contract_verification_server/README.md
      - core/node/da_clients/README.md
      - core/node/genesis/README.md
      - core/node/node_sync/README.md
      - core/node/state_keeper/README.md
    recursive: true
    section: "Protocol – ZK Network"

  # -- Infrastructure / tooling --------------------------------------------
  - repo: syscoin/docker-syscoin-core
    ref: master
    label: "Syscoin Docker images"
    paths:
      - README.md
    section: "Operations – Docker"

# ---------------------------------------------------------------------------
# Web / docs-site sources
# Pages are fetched, HTML is stripped to main content, then appended.
# Provide a list of URLs or a crawl root + include/exclude regex patterns.
# ---------------------------------------------------------------------------
web:

  - label: "Syscoin Official Docs"
    base_url: "https://docs.syscoin.org"
    # Crawl all pages under /docs (BFS, max_depth levels).
    crawl:
      root: "https://docs.syscoin.org"
      max_depth: 4
      max_pages: 200
      include_patterns:
        - "^https://docs\\.syscoin\\.org/"
      exclude_patterns:
        - "/api/"          # auto-generated API reference – large & less useful
        - "\\.pdf$"
        - "\\?lang="       # skip language variants
    section: "Official Docs"

  - label: "Syscoin Blog – selected posts"
    # List specific URLs rather than crawling the whole blog.
    urls:
      - "https://syscoin.org/news/syscoin-platform-upgrade"
      - "https://syscoin.org/news/introducing-rollux"
      - "https://syscoin.org/news/syscoin-4-4-launch"
      - "https://syscoin.org/news/z-dag-explained"
    section: "Ecosystem – Blog Highlights"

  - label: "Rollux Docs"
    base_url: "https://docs.rollux.com"
    crawl:
      root: "https://docs.rollux.com"
      max_depth: 3
      max_pages: 150
      include_patterns:
        - "^https://docs\\.rollux\\.com/"
      exclude_patterns:
        - "/api/"
        - "\\.pdf$"
    section: "Protocol – Rollux Docs"

# ---------------------------------------------------------------------------
# Inline / static snippets
# Small, hand-curated content blocks injected verbatim at assembly time.
# Use for network parameters, chain IDs, RPC endpoints, etc.
# ---------------------------------------------------------------------------
